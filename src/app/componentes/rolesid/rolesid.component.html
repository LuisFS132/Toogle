<div class="row">
    <div class="col">
        <h2>Resultados de la búsqueda</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" *ngFor="let rol of resultado">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Usuario: {{rol.role_name}}</h5>
                        <p class="card-text">{{rol.can_create_post}}</p>
                        <p class="card-text">{{rol.can_edit_post}}</p>
                        <p class="card-text">{{rol.can_delete_post}}</p>
                        <p class="card-text">{{rol.can_manage_users}}</p>
                        <p class="card-text"><small class="text-muted">{{rol.created_at}}</small></p>
                        <button class="btn btn-primary" (click)="regresar()">Regresar</button>
                    </div>
                </div>
            </div>
        </div>

        <div *ngIf="!resultado || resultado.length === 0" class="alert alert-info mt-3">
            No se encontraron roles
        </div>
    </div>
</div>
