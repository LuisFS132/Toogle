<div>
    {{formProducto.value|json}}
</div>

<form #formProducto="ngForm" align="center">

    <!-- 
        Diseñar el formulario para recoger la información de un producto
        nombre, descripcion, precio, cantidad
     -->

    <div class="mb-3" align="center">
        <div class="col-sm-4">
            <label for="content" class="form-label">¿Qué estas pensando? </label>
            <input type="text" class="form-control" id="content" name="content" ngModel placeholder="Publicación">
        </div>
    </div>

    <button class="button" type="button" (click)="guardar(formProducto.value)">Guardar</button>
</form>
