<div class="container-fluid py-4 bg-light">
    <div class="container">
        <!-- Barra de búsqueda -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-8">
                <div class="input-group shadow-sm">
                    <input type="text" class="form-control border-0 py-3" placeholder="¿Qué quieres encontrar?" #txtBuscar>
                    <button class="btn btn-primary px-4" (click)="buscarPost(txtBuscar.value)">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                </div>
            </div>
        </div>

        <!-- Feed de posts -->
        <div class="row justify-content-center">
            <div class="col-md-8">
                @for (post of posts; track post.id) {
                <div class="card shadow-sm mb-4 border-0 rounded-3">
                    <div class="card-header bg-white border-0 d-flex align-items-center py-3">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed={{post.user_id}}" class="rounded-circle me-3" alt="avatar" style="width: 40px; height: 40px">
                        <div>
                            <h6 class="mb-0 fw-bold">Usuario #{{post.user_id}}</h6>
                            <small class="text-muted">{{post.created_at | date:'medium'}}</small>
                        </div>
                    </div>

                    <div class="card-body">
                        <p class="card-text">{{post.content}}</p>
                        @if (post.image_url) {
                        <img [src]="post.image_url" class="img-fluid rounded-3 w-100 mb-3" alt="Post image"> }

                        <div class="d-flex justify-content-between align-items-center">
                            <div class="btn-group">
                                <button class="btn btn-outline-primary btn-sm" (click)="verPost(post.id)">
                                    <i class="fas fa-eye"></i> Ver
                                </button>
                                <button class="btn btn-outline-primary btn-sm">
                                    <i class="fas fa-edit"></i> Editar
                                </button>
                                <button class="btn btn-outline-danger btn-sm">
                                    <i class="fas fa-trash"></i> Eliminar
                                </button>
                            </div>
                            <div>
                                <button class="btn btn-light btn-sm me-2" (click)="darMeGusta(post.id)">
                                    <i class="fas fa-heart"></i> Me gusta ({{post.likes || 0}})
                                </button>
                                <button class="btn btn-light btn-sm" (click)="comentar(post.id, comentarioInput.value); comentarioInput.value=''">
                                    <i class="fas fa-comment"></i> Comentar
                                </button>
                            </div>
                        </div>

                        <!-- Sección para mostrar comentarios -->
                        <div class="mt-3">
                            <h6>Comentarios:</h6>
                            <ul class="list-group">
                                <li *ngFor="let comment of post.comments" class="list-group-item">
                                    {{ comment }}
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Campo para escribir un nuevo comentario -->
                <div class="mt-3">
                    <input type="text" #comentarioInput class="form-control mb-2" placeholder="Escribe un comentario">
                </div>
                }

                <div *ngIf="!posts || posts.length === 0" class="alert alert-info text-center py-5 rounded-3">
                    <i class="fas fa-inbox fa-3x mb-3"></i>
                    <h5>No hay posts para mostrar</h5>
                    <p class="mb-0">¡Sé el primero en publicar algo!</p>
                </div>
            </div>
        </div>
    </div>
</div>
