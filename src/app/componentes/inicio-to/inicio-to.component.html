<table class="table">
    <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">ID Usuario</th>
            <th scope="col">Content</th>
            <th scope="col">Imagen</th>
            <th scope="col">Creado en</th>
        </tr>
    </thead>

    @for (elemento of posts; track resp.id) {
    <tbody>
        <tr>
            <th scope="row">{{elemento.id}}</th>
            <td>{{elemento.user_id}}</td>
            <td>{{elemento.content}}</td>
            <td>{{elemento.image_url}}</td>
            <td>{{elemento.created_at}}</td>
    </tbody>

    <br> }

</table>
