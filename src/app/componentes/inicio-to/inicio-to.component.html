<div class="container mt-4">
    <h2>Posts</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Contenido</th>
                <th>Imagen</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            @for (post of posts; track post.id) {
            <tr>
                <td>{{post.id}}</td>
                <td>{{post.user_id}}</td>
                <td>{{post.content}}</td>
                <td>
                    @if (post.image_url) {
                    <img [src]="post.image_url" alt="Post image" class="img-thumbnail" style="max-width: 100px;"> }
                </td>
                <td>{{post.created_at}}</td>
                <td>
                    <button class="btn btn-primary btn-sm me-2">Editar</button>
                    <button class="btn btn-danger btn-sm">Eliminar</button>
                </td>
            </tr>
            }
        </tbody>
    </table>
</div>
