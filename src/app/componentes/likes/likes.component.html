<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Buscar likes..." #txtBuscar>
                <button class="btn btn-primary" (click)="buscarLike(txtBuscar.value)">
                    Buscar
                </button>
            </div>
        </div>
    </div>

    <h2>Likes</h2>
    <div class="row">
        <div class="col">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario ID</th>
                        <th>Posts ID</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    @for (like of likes; track like.id) {
                    <tr>
                        <td>{{like.id}}</td>
                        <td>{{like.user_id}}</td>
                        <td>{{like.post_id}}</td>
                        <td>{{like.created_at}}</td>
                        <td>
                            <button class="btn btn-info btn-sm me-2" (click)="verLike(like.id)">Ver</button>
                            <button class="btn btn-primary btn-sm me-2">Editar</button>
                            <button class="btn btn-danger btn-sm">Eliminar</button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>

            <div *ngIf="!likes || likes.length === 0" class="alert alert-info mt-3">
                No se encontraron likes
            </div>
        </div>
    </div>
</div>
