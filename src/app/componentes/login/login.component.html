<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access your account</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="form-container">
                <mat-form-field appearance="fill">
                    <mat-label>Email</mat-label>
                    <input matInput placeholder="Enter your email" formControlName="email">
                    <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
                    <mat-error *ngIf="form.get('email')?.hasError('email')">Please enter a valid email</mat-error>
                </mat-form-field>

                <mat-form-field appearance="fill">
                    <mat-label>Password</mat-label>
                    <input matInput [type]="'password'" placeholder="Enter your password" formControlName="password">
                    <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
                </mat-form-field>

                <button mat-flat-button color="primary" class="auth-button" type="submit" [disabled]="!form.valid">
                    Log In
                </button>
            </div>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <button mat-flat-button class="google-button" type="button" (click)="onClickGoogle()">
            <img src="google.ico" alt="Google" width="24" height="24">
            Continue with Google
        </button>

        <div class="auth-link">
            <a routerLink="/registro">Don't have an account? Sign up</a>
        </div>
    </div>
</div>
