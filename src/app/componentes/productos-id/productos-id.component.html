<div class="row">
    <div class="col">
        <h2>Resultados de la búsqueda</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" *ngFor="let producto of resultado">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{producto.nombre}}</h5>
                        <p class="card-text">{{producto.descripcion}}</p>
                        <p class="card-text"><strong>Precio: </strong>${{producto.precio}}</p>
                        <p class="card-text"><strong>Cantidad: </strong>{{producto.cantidad}}</p>
                        <button class="btn btn-primary" (click)="regresar()">Regresar</button>
                    </div>
                </div>
            </div>
        </div>

        <div *ngIf="!resultado || resultado.length === 0" class="alert alert-info mt-3">
            No se encontraron productos
        </div>
    </div>
</div>
