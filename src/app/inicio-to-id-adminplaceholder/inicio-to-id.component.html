<div class="row">
    <div class="col">
        <h2>Resultados de la búsqueda</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" *ngFor="let post of resultado">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">Usuario: {{post.user_id}}</h5>
                        <p class="card-text">{{post.content}}</p>
                        @if (post.image_url) {
                        <img [src]="post.image_url" class="card-img-top" alt="Post image"> }
                        <p class="card-text"><small class="text-muted">{{post.created_at}}</small></p>
                        <button class="btn btn-primary" (click)="regresar()">Regresar</button>
                    </div>
                </div>
            </div>
        </div>

        <div *ngIf="!resultado || resultado.length === 0" class="alert alert-info mt-3">
            No se encontraron posts
        </div>
    </div>
</div>
