<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Buscar posts..." #txtBuscar>
                <button class="btn btn-primary" (click)="buscarPost(txtBuscar.value)">
                    Buscar
                </button>
            </div>
        </div>
    </div>

    <h2>Posts</h2>
    <div class="row">
        <div class="col">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Contenido</th>
                        <th>Imagen</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    @for (post of posts; track post.id) {
                    <tr>
                        <td>{{post.id}}</td>
                        <td>{{post.user_id}}</td>
                        <td>{{post.content}}</td>
                        <td>
                            @if (post.image_url) {
                            <img [src]="post.image_url" alt="Post image" class="img-thumbnail" style="max-width: 100px;"> }
                        </td>
                        <td>{{post.created_at}}</td>
                        <td>
                            <button class="btn btn-info btn-sm me-2" (click)="verPost(post.id)">Ver</button>
                            <button class="btn btn-primary btn-sm me-2">Editar</button>
                            <button class="btn btn-danger btn-sm">Eliminar</button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>

            <div *ngIf="!posts || posts.length === 0" class="alert alert-info mt-3">
                No se encontraron posts
            </div>
        </div>
    </div>
</div>
